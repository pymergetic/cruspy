openapi: "3.1.0"
info:
  title: Document Model
  version: "1.0.0"

x-cruspy-namespace: pymergetic.cruspy.models.document

components:
  schemas:

    Document:
      type: object
      description: "A scored document with optional metadata."

      properties:
        id:
          type: integer
          format: int32
          default: 0
          minimum: 0
          maximum: 100
          description: "Primary identifier."

        score:
          type: number
          format: double
          default: 0.0
          minimum: 0.0
          maximum: 1.0
          description: "Relevance score."

        active:
          type: boolean
          default: true
          description: "Whether the document is active."

        meta:
          $ref: "metadata/__init__.openapi.yaml#/components/schemas/Metadata"
          description: "Nested metadata object."

      x-cruspy-methods:
        - name: validate
          kind: instance
          mutating: false
          impl: cpp
          description: "Validates all field constraints against min/max bounds."
          returns:
            type: boolean
            description: "True if all constraints are satisfied."
          args: []

        - name: normalize
          kind: instance
          mutating: true
          impl: cpp
          description: "Clamps score to [0,1] and resets negative id."
          returns:
            type: "null"
          args: []

        - name: score_text
          kind: instance
          mutating: false
          impl: python
          description: "Computes semantic relevance for a text input."
          returns:
            type: number
            format: double
          args:
            - name: text
              schema: { type: string }
            - name: model_id
              schema: { type: string, default: "default" }

        - name: serialize
          kind: instance
          mutating: false
          impl: rust
          description: "Serializes to compact binary format."
          returns:
            type: string
            format: byte
          args: []

        - name: from_json
          kind: constructor
          impl: rust
          description: "Deserializes a Document from a JSON string."
          returns:
            type: object
            x-cruspy-self: true
          args:
            - name: json
              schema: { type: string }
            - name: domain
              schema: { type: string, default: "heap_default" }

        - name: default_domain
          kind: static
          impl: cpp
          description: "Returns the default memory domain name."
          returns:
            type: string
          args: []

        - name: schema
          kind: class
          impl: cpp
          description: "Returns the JSON schema for this model type."
          returns:
            type: string
          args: []
